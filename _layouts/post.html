---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>

<p class="post-nav"><a href="{{ '/blog/' | relative_url }}">← All writing</a></p>
